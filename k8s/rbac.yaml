# RBAC for Spark-on-Kubernetes
# ────────────────────────────────────────────────────────────────────────────
# The Spark driver (running in client mode on WSL2) uses the spark-driver
# ServiceAccount to authenticate against the k8s API server.
# The driver needs permission to create, watch and delete executor pods,
# services, and ConfigMaps inside the spark-jobs namespace.
# ────────────────────────────────────────────────────────────────────────────

# ── ServiceAccount ────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-driver
  namespace: spark-jobs
  labels:
    app.kubernetes.io/component: spark-driver

---
# ── Role: minimal permissions the driver needs ────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-executor-role
  namespace: spark-jobs
rules:
  # Executor pod lifecycle
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]
  # Executor log streaming (Spark UI / debugging)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  # Services for executor-to-driver communication
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "delete"]
  # ConfigMaps for Spark configuration injection
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "delete", "update"]

---
# ── RoleBinding ───────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-executor-binding
  namespace: spark-jobs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark-executor-role
subjects:
  - kind: ServiceAccount
    name: spark-driver
    namespace: spark-jobs
